<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鴉宅桌遊館收藏</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f5f1e8;
}

header{
    background:#3b2f2a;
    color:white;
    padding:25px;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.card h3{
    margin:0 0 8px 0;
}

.tag{
    display:inline-block;
    padding:3px 8px;
    background:#eee;
    border-radius:8px;
    font-size:12px;
    margin-right:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
    <h1>🎲 鴉宅桌遊館收藏</h1>
    <p>Google Sheet 即時同步</p>
</header>

<div class="container">
    <div id="games" class="grid"></div>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";

fetch(CSV_URL)
.then(res => res.text())
.then(data => {

    const rows = data.split("\n").map(r => r.split(","));

    const headers = rows[0];
    const games = rows.slice(1);

    const container = document.getElementById("games");

    games.forEach(g => {

        const name = g[0];
        const players = g[1];
        const time = g[2];
        const type = g[3];
        const difficulty = g[4];
        const feature = g[5];
        const note = g[6];

        if(!name) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${name}</h3>
            <div>👥 ${players}</div>
            <div>⏱ ${time}</div>
            <div class="tag">${type}</div>
            <div class="tag">${difficulty}</div>
            <div style="margin-top:8px;font-size:13px;color:#555;">
                ${feature || ""}
            </div>
        `;

        container.appendChild(card);
    });

});

</script>

</body>
</html>
