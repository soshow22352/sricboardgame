<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鴉宅桌遊館</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">

  

  <style>
    :root {
      --wood-900: #160c07;
      --wood-800: #24130a;
      --wood-700: #3a2113;
      --wood-600: #5d371f;
      --wood-500: #7c4a29;
      --wood-300: #b98249;
      --paper-100: #fff7e8;
      --paper-200: #f1dcc0;
      --paper-300: #dfbd8c;
      --ink: #2d1a10;
      --muted: #755136;
      --red: #8d2f20;
      --gold: #d9aa62;
      --shadow: 0 18px 45px rgba(18, 9, 4, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        linear-gradient(180deg, #3a2416 0%, #2b1b12 48%, #20130c 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.018), transparent 55%, rgba(0,0,0,0.026));
      opacity: 0.32;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at 50% 0%, rgba(255, 231, 185, 0.045), transparent 45%);
    }

    header {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 14px 8px;
      text-align: center;
    }

    .hero-box {
      position: relative;
      padding: 10px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255, 230, 178, 0.9), rgba(106, 61, 31, 0.9), rgba(214, 169, 104, 0.92)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 2px, rgba(0,0,0,.08) 3px 12px);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 246, 222, 0.42);
    }

    .hero-box::before,
    .hero-box::after {
      content: "";
      position: absolute;
      width: 78px;
      height: 78px;
      opacity: 0.86;
      pointer-events: none;
      background:
        radial-gradient(circle, rgba(141, 47, 32, 0.9) 0 34%, transparent 35%),
        conic-gradient(from 10deg, transparent 0 12%, rgba(217,170,98,.65) 12% 17%, transparent 17% 29%, rgba(217,170,98,.65) 29% 34%, transparent 34% 100%);
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.3));
    }

    .hero-box::before {
      left: -18px;
      top: -14px;
      transform: rotate(-14deg) scale(.78);
    }

    .hero-box::after {
      right: -16px;
      bottom: -20px;
      transform: rotate(18deg) scale(.65);
    }

    .hero-box img {
      width: 100%;
      display: block;
      border-radius: 22px;
      border: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.24);
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 13px 12px;
      margin: 16px auto 24px;
      background:
        linear-gradient(180deg, rgba(56, 32, 17, 0.90), rgba(34, 18, 9, 0.88));
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,240,210,0.23);
      border-bottom: 1px solid rgba(255,240,210,0.18);
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
    }

    .tabs button {
      position: relative;
      border: 1px solid rgba(218, 173, 109, 0.8);
      border-radius: 999px;
      padding: 10px 18px;
      background:
        linear-gradient(180deg, #fff7e5, #e6c48f);
      color: #3b2416;
      font-family: inherit;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,.75);
      transition: 0.22s ease;
    }

    .tabs button::before {
      content: "";
      position: absolute;
      inset: 4px 9px auto;
      height: 1px;
      background: rgba(255,255,255,.55);
    }

    .tabs button:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #fffaf0, #f1ce95);
    }

    .tabs button.active {
      background:
        linear-gradient(180deg, #82502e, #351d10);
      color: #fff3d8;
      border-color: rgba(255, 219, 151, 0.9);
    }

    .tabs button.official-tab {
      background: linear-gradient(180deg, #9b3d2a, #5c2718);
      color: #fff3d8;
    }

    .filter-box,
    .rules-wrap,
    .official-wrap {
      position: relative;
      max-width: 1120px;
      margin: 0 auto 24px;
      padding: 20px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.42), transparent 18%),
        linear-gradient(180deg, rgba(255, 248, 232, 0.97), rgba(225, 198, 156, 0.96));
      border: 1px solid rgba(105, 65, 30, 0.37);
      box-shadow: var(--shadow);
    }

    .filter-box::before,
    .rules-wrap::before,
    .official-wrap::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(112, 75, 39, 0.28);
      border-radius: 20px;
      pointer-events: none;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    select {
      min-width: 150px;
      padding: 11px 15px;
      border-radius: 999px;
      border: 1px solid rgba(105, 65, 30, 0.45);
      background: #fff8ea;
      color: #3b2416;
      font-family: inherit;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
    }

    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }

    .tag-check {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(105, 65, 30, 0.25);
      background: rgba(255,255,255,0.48);
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(72,43,21,.08);
    }

    .tag-check input {
      accent-color: #7b4a29;
    }

    .grid {
      max-width: 1200px;
      margin: 26px auto 56px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(205px, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background:
        linear-gradient(180deg, #fff7e6, #e5c391);
      border: 1px solid rgba(105, 65, 30, 0.36);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: 0.25s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.24), transparent 18%, transparent 80%, rgba(93,55,31,.09)),
        repeating-linear-gradient(0deg, rgba(92,55,26,.035) 0 1px, transparent 1px 7px);
      z-index: 1;
    }

    .card::after {
      content: "";
      position: absolute;
      right: 14px;
      bottom: 10px;
      z-index: 1;
      color: rgba(96, 56, 29, .18);
      font-size: 34px;
    }

    .card:hover {
      transform: translateY(-5px) rotate(-0.2deg);
      box-shadow: 0 26px 54px rgba(0,0,0,0.42);
      border-color: rgba(217, 170, 98, 0.72);
    }

    .card img {
      width: 100%;
      height: 155px;
      display: block;
      object-fit: contain;
      padding: 10px;
      background:
        radial-gradient(circle at 50% 38%, #fffaf0 0%, #e1bd82 76%),
        linear-gradient(135deg, rgba(255,255,255,.2), rgba(0,0,0,.08));
      position: relative;
      z-index: 0;
    }

    .card-body {
      padding: 12px 13px 14px;
      position: relative;
      z-index: 2;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
      color: #2f1a0f;
      letter-spacing: .03em;
    }

    .info {
      font-size: 12px;
      line-height: 1.55;
      color: #735033;
      margin-top: 7px;
    }

    .tag {
      display: inline-block;
      margin: 3px 3px 0 0;
      padding: 3px 7px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8b5630, #5c321b);
      color: #fff3d8;
      font-size: 11px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      padding: 6px 10px;
      border-radius: 999px;
      background: #8d2f20;
      color: #fff4de;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 6px 14px rgba(0,0,0,0.26);
    }

    .rules-wrap {
      max-width: 900px;
      margin: 28px auto 56px;
      padding: 24px;
    }

    .rules-title,
    .official-title {
      margin: 0 0 18px;
      text-align: center;
      color: #4a2a18;
      font-size: 34px;
      letter-spacing: 6px;
      position: relative;
      z-index: 1;
    }

    .rule-img {
      width: 100%;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(105, 65, 30, 0.10);
      box-shadow: 0 4px 10px rgba(76,45,20,.10);
      position: relative;
      z-index: 1;
    }

    .photo-wall {
      max-width: 1200px;
      margin: 26px auto 56px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }

    .photo-wall img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 10px solid #fff3d8;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .22s ease;
      transform: rotate(-.4deg);
    }

    .photo-wall img:nth-child(even) {
      transform: rotate(.5deg);
    }

    .photo-wall img:hover {
      transform: scale(1.03) rotate(0deg);
    }

    .official-wrap {
      max-width: 760px;
      margin: 30px auto 58px;
      text-align: center;
      padding: 28px 22px 32px;
    }

    .official-card {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0 auto;
      padding: 24px 20px 26px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,250,238,.95), rgba(229,199,153,.95));
      border: 1px solid rgba(105, 65, 30, 0.35);
      box-shadow: 0 14px 32px rgba(72,43,21,.22);
    }

    .qr-frame {
      width: min(280px, 78vw);
      height: min(280px, 78vw);
      margin: 0 auto 18px;
      padding: 14px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, #7b4a29, #d9aa62, #4a2a18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35), 0 16px 30px rgba(0,0,0,.22);
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 14px;
      background: #fff;
      padding: 8px;
    }


    .card-actions,
    .photo-actions {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px dashed rgba(105, 65, 30, 0.18);
    }

    .interaction-controls {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 7px;
    }

    .like-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 32px;
      border: 1px solid rgba(141, 47, 32, 0.24);
      border-radius: 999px;
      padding: 6px 9px;
      background: linear-gradient(180deg, #fff6e7, #eacb9a);
      color: #70321f;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(80, 45, 22, .12);
      transition: .18s ease;
    }

    .like-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .comment-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 5px;
      min-width: 0;
    }

    .comment-box input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(105, 65, 30, 0.24);
      border-radius: 999px;
      padding: 7px 9px;
      background: rgba(255, 250, 238, .86);
      color: #3b2416;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    .comment-box button {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      padding: 7px 9px;
      background: #6f4326;
      color: #fff3d8;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .comment-list {
      margin-top: 7px;
      display: grid;
      gap: 5px;
    }

    .comment-list.is-empty {
      display: none;
    }

    .comment-item {
      padding: 5px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .34);
      color: #634124;
      font-size: 11px;
      line-height: 1.4;
      word-break: break-word;
    }

    .comment-more {
      color: #8d2f20;
      font-size: 11px;
      font-weight: 800;
    }

    .modal-interaction {
      margin-top: 14px;
    }

    .modal-interaction .comment-list {
      max-height: 180px;
      overflow: auto;
      padding-right: 3px;
    }

    .interaction-status {
      min-height: 16px;
      margin-top: 5px;
      color: #8d2f20;
      font-size: 11px;
      font-weight: 700;
    }

    .like-btn:disabled,
    .comment-box button:disabled {
      opacity: .62;
      cursor: wait;
      transform: none;
    }

    .photo-item {
      padding: 10px;
      border-radius: 20px;
      background: rgba(255, 247, 229, .86);
      border: 1px solid rgba(105, 65, 30, .22);
      box-shadow: var(--shadow);
    }

    .photo-item img {
      border-width: 5px;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }

    .official-card p {
      color: #6b472b;
      line-height: 1.8;
      margin: 8px auto 16px;
    }

    .line-btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8d2f20, #5c2316);
      color: #fff5df;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 8px 18px rgba(86,35,22,.28);
      transition: .22s ease;
    }

    .line-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(26,13,5,0.78);
      backdrop-filter: blur(10px);
    }

    .modal-content {
      position: relative;
      width: 100%;
      max-width: 760px;
      max-height: 92vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff5df, #e4c79a);
      box-shadow: 0 28px 60px rgba(0,0,0,0.45);
    }

    .modal-content img {
      width: 100%;
      max-height: 260px;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
      padding: 8px;
      background: radial-gradient(circle, #fff8e8 0%, #dcb987 82%);
    }

    .modal-body {
      padding: 16px 20px 18px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-body h2 {
      margin: 0 0 6px;
      color: #3b2416;
      font-size: 28px;
      line-height: 1.2;
    }

    .youtube-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 18px;
      border-radius: 999px;
      background: #8d2f20;
      color: white;
      text-decoration: none;
      font-weight: 900;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 100;
      width: 38px;
      height: 38px;
      line-height: 34px;
      text-align: center;
      border-radius: 50%;
      background: rgba(59,36,22,0.86);
      color: #fff4de;
      font-size: 30px;
      cursor: pointer;
    }

    .photo-modal-content {
      max-width: 1000px;
      background: transparent;
      box-shadow: none;
    }

    .photo-modal-content img {
      max-height: 62vh;
      border-radius: 18px;
      border: 6px solid #fff3d8;
      background: #fff3d8;
      padding: 0;
    }

    .photo-modal-content {
      background: linear-gradient(180deg, #fff5df, #e4c79a);
      padding-bottom: 14px;
    }

    #photoModalInteraction {
      padding: 0 16px 4px;
    }

    .hidden {
      display: none !important;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 35px 20px;
      border-radius: 22px;
      background: rgba(255,248,232,0.92);
      color: #5f3a20;
      box-shadow: var(--shadow);
    }

    @media (max-width: 700px) {
      header {
        padding-top: 14px;
      }

      .hero-box {
        border-radius: 22px;
        padding: 6px;
      }

      .hero-box img {
        border-radius: 17px;
      }

      .tabs {
        position: relative;
        gap: 8px;
        margin-top: 12px;
      }

      .tabs button {
        padding: 9px 13px;
        font-size: 14px;
      }

      .filter-box {
        margin-left: 12px;
        margin-right: 12px;
        padding: 16px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
      }

      .card img {
        height: 125px;
      }

      .card h3 {
        font-size: 16px;
      }

      .rules-wrap,
      .official-wrap {
        margin-left: 12px;
        margin-right: 12px;
        padding: 18px;
      }

      .rules-title,
      .official-title {
        font-size: 28px;
        letter-spacing: 4px;
      }

      .modal {
        align-items: flex-start;
        padding: 10px;
        overflow-y: auto;
      }

      .modal-content {
        max-height: calc(100vh - 20px);
        max-width: 100%;
        margin: 0 auto;
      }

      .modal-content img {
        max-height: 185px;
        padding: 6px;
      }

      .modal-body {
        padding: 13px 14px 16px;
      }

      .modal-body h2 {
        font-size: 23px;
      }

      .modal-interaction {
        margin-top: 10px;
      }

      .interaction-controls {
        grid-template-columns: 74px 1fr;
        gap: 6px;
      }

      .like-btn {
        min-height: 38px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .comment-box {
        grid-template-columns: 1fr 58px;
        gap: 6px;
      }

      .comment-box input {
        min-height: 38px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .comment-box button {
        min-height: 38px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .modal-interaction .comment-list {
        max-height: 150px;
      }

      .photo-modal-content img {
        max-height: 55vh;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="hero-box">
      <img src="images/banner/banner.jpg" alt="鴉宅桌遊館" onerror="this.style.display='none'">
    </div>
  </header>

  <nav class="tabs">
    <button class="active" onclick="switchTab('games', this)">桌遊列表</button>
    <button onclick="switchTab('recommend', this)">團長推薦</button>
    <button onclick="switchTab('photos', this)">活動相片</button>
    <button onclick="switchTab('rules', this)">注意事項</button>
    <button class="official-tab" onclick="switchTab('official', this)">官方帳號</button>
  </nav>

  <section id="filterBox" class="filter-box">
    <div class="filter-bar">
      <select id="playerFilter">
        <option value="">全部人數</option>
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6+">6人以上</option>
      </select>

      <select id="timeFilter">
        <option value="">全部時間</option>
        <option value="30">30分鐘內</option>
        <option value="60">31–60分鐘</option>
        <option value="120">61分鐘以上</option>
      </select>
    </div>

    <div id="tagFilter" class="tag-filter"></div>
  </section>

  <main id="grid" class="grid"></main>

  <section id="photos" class="photo-wall hidden"></section>

  <section id="rules" class="rules-wrap hidden">
    <img class="rule-img" src="images/rules/rules-v2.png" alt="鴉宅桌遊館注意事項" onerror="this.outerHTML='<div class=&quot;empty-state&quot;>注意事項圖片尚未上傳或路徑錯誤。</div>'">
  </section>

  <section id="official" class="official-wrap hidden">
    <h2 class="official-title">官方帳號</h2>
    <div class="official-card">
      <div class="qr-frame">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=12&data=https%3A%2F%2Fline.me%2FR%2Fti%2Fp%2F%40187jgojd" alt="鴉宅桌遊館 LINE 官方帳號 QR Code">
      </div>
      <p>掃描 QR Code 加入鴉宅桌遊館官方帳號，或點擊下方按鈕前往 LINE。</p>
      <a class="line-btn" href="https://line.me/R/ti/p/@187jgojd" target="_blank" rel="noopener">點我加入 LINE</a>
    </div>
  </section>

  <div id="modal" class="modal hidden" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="close" onclick="hideModal()">×</div>
      <img id="modalImg" src="" alt="">
      <div class="modal-body">
        <h2 id="modalName"></h2>
        <div id="modalMeta" class="info"></div>
        <div id="modalTags"></div>
        <p id="modalFeature" class="info"></p>
        <a id="youtubeLink" class="youtube-btn" target="_blank">▶ YouTube 介紹影片</a>
        <div id="modalInteraction" class="modal-interaction"></div>
      </div>
    </div>
  </div>

  <div id="photoModal" class="modal hidden" onclick="hidePhotoModal()">
    <div class="modal-content photo-modal-content">
      <div class="close" onclick="hidePhotoModal()">×</div>
      <img id="photoModalImg" src="" alt="活動相片">
      <div id="photoModalInteraction" class="modal-interaction"></div>
    </div>
  </div>

  <script>
    const GAME_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";
    const PHOTO_CSV_URL = "https://docs.google.com/spreadsheets/d/11B2F_OC-8NTJyalXLWZc6yYIPHyzSKej0V4u3QpbGDg/gviz/tq?tqx=out:csv&sheet=%E6%B4%BB%E5%8B%95%E7%9B%B8%E7%89%87";
    const INTERACTION_API_URL = "https://script.google.com/macros/s/AKfycbwVKwJur4x7mh2XbNPmqEj3FRGxNg1i7q2vLSl3MFI8GmQ2CbhM1RZng1NpXgxZbnCS/exec";

    let games = [];
    let currentTab = "games";
    let photosLoaded = false;

    function makeKey(type, value) {
      return `sricBoardgame_${type}_${encodeURIComponent(String(value || '').slice(0, 160))}`;
    }

    function getVisitorId() {
      let id = localStorage.getItem('sricBoardgame_visitorId');
      if (!id) {
        id = `visitor_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem('sricBoardgame_visitorId', id);
      }
      return id;
    }

    function getLikeCount(type, value) {
      return Number(localStorage.getItem(makeKey(type + '_likes', value))) || 0;
    }

    function getItemName(type, value) {
      if (type === 'photo') return '活動照片';
      return String(value || '未命名桌遊');
    }

    function getItemId(type, value) {
      return `${type}_${encodeURIComponent(String(value || '').slice(0, 80))}`;
    }

    function saveInteraction(record) {
      // 寫入 Google 試算表。使用 no-cors 可避免瀏覽器 CORS 阻擋；送出後無法讀取回應，但資料會進表格。
      return fetch(INTERACTION_API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(record)
      });
    }

    function showInteractionStatus(box, message) {
      const status = box.querySelector('.interaction-status');
      if (!status) return;
      status.textContent = message;
      clearTimeout(status._timer);
      status._timer = setTimeout(() => status.textContent = '', 1800);
    }

    function handleLike(btn) {
      const box = btn.closest('[data-interaction]');
      const type = box.dataset.type;
      const value = box.dataset.value;
      const key = makeKey(type + '_likes', value);
      const next = (Number(localStorage.getItem(key)) || 0) + 1;
      localStorage.setItem(key, String(next));
      box.querySelector('.like-count').textContent = next;
      btn.disabled = true;
      showInteractionStatus(box, '已送出按讚');

      saveInteraction({
        type: type === 'photo' ? 'photo_like' : 'game_like',
        itemId: getItemId(type, value),
        itemName: getItemName(type, value),
        content: 'like',
        visitorId: getVisitorId()
      }).finally(() => {
        setTimeout(() => btn.disabled = false, 900);
      });
    }

    function getComments(type, value) {
      try {
        return JSON.parse(localStorage.getItem(makeKey(type + '_comments', value)) || '[]');
      } catch {
        return [];
      }
    }

    function handleComment(btn) {
      const box = btn.closest('[data-interaction]');
      const type = box.dataset.type;
      const value = box.dataset.value;
      const input = box.querySelector('input');
      const text = String(input.value || '').trim().slice(0, 20);
      if (!text) {
        showInteractionStatus(box, '請先輸入留言');
        return;
      }

      const key = makeKey(type + '_comments', value);
      const comments = getComments(type, value);
      comments.unshift(text);
      localStorage.setItem(key, JSON.stringify(comments.slice(0, 20)));
      input.value = '';
      renderCommentList(box);
      btn.disabled = true;
      showInteractionStatus(box, '留言已送出');

      saveInteraction({
        type: type === 'photo' ? 'photo_comment' : 'game_comment',
        itemId: getItemId(type, value),
        itemName: getItemName(type, value),
        content: text,
        visitorId: getVisitorId()
      }).finally(() => {
        setTimeout(() => btn.disabled = false, 900);
      });
    }

    function renderCommentList(box) {
      const type = box.dataset.type;
      const value = box.dataset.value;
      const list = box.querySelector('.comment-list');
      const comments = getComments(type, value);
      const isFull = box.dataset.view === 'full';
      const limit = isFull ? 20 : 1;
      const shown = comments.slice(0, limit);
      list.classList.toggle('is-empty', shown.length === 0);
      list.innerHTML = shown.map(c => `<div class="comment-item">${safe(c)}</div>`).join('');
      if (!isFull && comments.length > 1) {
        list.innerHTML += `<div class="comment-more">點開查看全部 ${comments.length} 則留言</div>`;
      }
    }

    function interactionBlock(type, value, view = 'compact') {
      return `
        <div class="${type === 'photo' ? 'photo-actions' : 'card-actions'}" data-interaction data-type="${safe(type)}" data-value="${safe(value)}" data-view="${safe(view)}" onclick="event.stopPropagation()">
          <div class="interaction-controls">
            <button class="like-btn" onclick="handleLike(this)">♡ <span class="like-count">${getLikeCount(type, value)}</span></button>
            <div class="comment-box">
              <input maxlength="20" placeholder="留言20字內" onkeydown="if(event.key === 'Enter') handleComment(this.nextElementSibling)">
              <button onclick="handleComment(this)">留言</button>
            </div>
          </div>
          <div class="interaction-status" aria-live="polite"></div>
          <div class="comment-list"></div>
        </div>
      `;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quote = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"' && quote && next === '"') {
          cell += '"';
          i++;
        } else if (c === '"') {
          quote = !quote;
        } else if (c === "," && !quote) {
          row.push(cell.trim());
          cell = "";
        } else if ((c === "\n" || c === "\r") && !quote) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
          if (c === "\r" && next === "\n") i++;
        } else {
          cell += c;
        }
      }

      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function safe(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getIndex(headers, possibleNames) {
      for (const name of possibleNames) {
        const found = headers.findIndex(h => String(h || "").trim() === name);
        if (found !== -1) return found;
      }
      return -1;
    }

    function normalizeImageUrl(url) {
      if (!url) return "";
      url = String(url).trim();

      const driveFile = url.match(/\/file\/d\/([^/]+)/);
      const driveId = url.match(/[?&]id=([^&]+)/);

      if (driveFile) {
        return `https://drive.google.com/thumbnail?id=${driveFile[1]}&sz=w1600`;
      }

      if (driveId) {
        return `https://drive.google.com/thumbnail?id=${driveId[1]}&sz=w1600`;
      }

      return url;
    }

    function splitTags(str) {
      return String(str || "")
        .split(/[|,，、]/)
        .map(t => t.trim())
        .filter(Boolean);
    }

    function parseTime(str) {
      const nums = String(str || "").match(/\d+/g);
      if (!nums) return 0;
      return Math.max(...nums.map(Number));
    }

    function render(list) {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state">沒有符合條件的桌遊。</div>`;
        return;
      }

      list.forEach((g, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.onclick = () => openModal(g);

        card.innerHTML = `
          ${g.note.includes("推薦") ? `<div class="badge">團長推薦</div>` : ""}
          <img src="${safe(normalizeImageUrl(g.img))}" alt="${safe(g.name)}" loading="lazy" onerror="this.src='https://picsum.photos/500/350?blur=1'">
          <div class="card-body">
            <h3>${safe(g.name)}</h3>
            <div class="info">${g.minPlayers}–${g.maxPlayers}人 ｜ ⏱ ${safe(g.timeText)}</div>
            <div>${g.tags.map(t => `<span class="tag">${safe(t)}</span>`).join("")}</div>
            <div class="info">${safe(g.feature)}</div>
            ${interactionBlock('game', g.name)}
          </div>
        `;

        grid.appendChild(card);
        card.querySelectorAll('[data-interaction]').forEach(renderCommentList);
      });
    }

    function filter() {
      let list = [...games];

      const player = document.getElementById("playerFilter").value;
      const time = document.getElementById("timeFilter").value;
      const checkedTags = [...document.querySelectorAll(".tagOption:checked")].map(i => i.value);

      if (currentTab === "recommend") {
        list = list.filter(g => g.note.includes("推薦"));
      }

      if (player) {
        if (player === "6+") {
          list = list.filter(g => g.maxPlayers >= 6);
        } else {
          const p = Number(player);
          list = list.filter(g => p >= g.minPlayers && p <= g.maxPlayers);
        }
      }

      if (time === "30") list = list.filter(g => g.time <= 30);
      if (time === "60") list = list.filter(g => g.time > 30 && g.time <= 60);
      if (time === "120") list = list.filter(g => g.time > 60);

      if (checkedTags.length) {
        list = list.filter(g => checkedTags.every(tag => g.tags.includes(tag)));
      }

      render(list);
    }

    function switchTab(tab, btn) {
      currentTab = tab;

      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const isStatic = tab === "rules" || tab === "photos" || tab === "official";

      document.getElementById("filterBox").classList.toggle("hidden", isStatic);
      document.getElementById("grid").classList.toggle("hidden", isStatic);
      document.getElementById("rules").classList.toggle("hidden", tab !== "rules");
      document.getElementById("photos").classList.toggle("hidden", tab !== "photos");
      document.getElementById("official").classList.toggle("hidden", tab !== "official");

      if (tab === "photos") loadPhotos();
      if (tab === "games" || tab === "recommend") filter();
    }

    function openModal(g) {
      document.getElementById("modalImg").src = normalizeImageUrl(g.img) || "https://picsum.photos/800/500?blur=1";
      document.getElementById("modalName").textContent = g.name;
      document.getElementById("modalMeta").textContent = `適合人數：${g.minPlayers}–${g.maxPlayers}人 ｜ 遊戲時間：${g.timeText}`;
      document.getElementById("modalTags").innerHTML = g.tags.map(t => `<span class="tag">${safe(t)}</span>`).join("");
      document.getElementById("modalFeature").textContent = `特色：${g.feature || "尚未填寫"}`;
      document.getElementById("youtubeLink").href = `https://www.youtube.com/results?search_query=${encodeURIComponent(g.name + " 桌遊 教學 介紹")}`;
      const modalInteraction = document.getElementById("modalInteraction");
      modalInteraction.innerHTML = interactionBlock('game', g.name, 'full');
      modalInteraction.querySelectorAll('[data-interaction]').forEach(renderCommentList);
      document.getElementById("modal").classList.remove("hidden");
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function openPhotoModal(src) {
      document.getElementById("photoModalImg").src = src;
      const photoModalInteraction = document.getElementById("photoModalInteraction");
      photoModalInteraction.innerHTML = interactionBlock('photo', src, 'full');
      photoModalInteraction.querySelectorAll('[data-interaction]').forEach(renderCommentList);
      document.getElementById("photoModal").classList.remove("hidden");
    }

    function hidePhotoModal() {
      document.getElementById("photoModal").classList.add("hidden");
    }

    function loadPhotos() {
      const photosBox = document.getElementById("photos");

      if (photosLoaded) return;

      photosBox.innerHTML = `<div class="empty-state">活動相片載入中...</div>`;

      fetch(PHOTO_CSV_URL)
        .then(r => r.text())
        .then(text => {
          const rows = parseCSV(text);
          const headers = rows[0] || [];
          const imgIndex = getIndex(headers, ["圖片", "照片", "圖片網址", "相片"]);

          if (imgIndex === -1) {
            photosBox.innerHTML = `<div class="empty-state">找不到活動相片欄位。</div>`;
            return;
          }

          const photoList = rows.slice(1)
            .map(r => normalizeImageUrl(r[imgIndex]))
            .filter(Boolean);

          if (!photoList.length) {
            photosBox.innerHTML = `<div class="empty-state">目前尚無活動相片。</div>`;
            return;
          }

          photosBox.innerHTML = "";

          photoList.forEach((src, index) => {
            const item = document.createElement("article");
            item.className = "photo-item";
            item.innerHTML = `
              <img src="${safe(src)}" loading="lazy" alt="活動相片" onerror="this.style.display='none'">
              ${interactionBlock('photo', src)}
            `;
            const img = item.querySelector("img");
            img.onclick = () => openPhotoModal(src);
            photosBox.appendChild(item);
            item.querySelectorAll('[data-interaction]').forEach(renderCommentList);
          });

          photosLoaded = true;
        })
        .catch(() => {
          photosBox.innerHTML = `<div class="empty-state">活動相片讀取失敗。</div>`;
        });
    }

    fetch(GAME_CSV_URL)
      .then(r => r.text())
      .then(text => {
        const rows = parseCSV(text);
        const headers = rows[0] || [];

        const idxName = getIndex(headers, ["桌遊名稱", "名稱", "遊戲名稱"]);
        const idxMin = getIndex(headers, ["最少人數", "最小人數"]);
        const idxMax = getIndex(headers, ["最多人數", "最大人數"]);
        const idxTime = getIndex(headers, ["時間", "遊戲時間"]);
        const idxTags = getIndex(headers, ["標籤", "類型", "分類"]);
        const idxFeature = getIndex(headers, ["特點", "特色", "介紹"]);
        const idxNote = getIndex(headers, ["備註", "推薦"]);
        const idxImg = getIndex(headers, ["圖片", "圖片網址", "封面"]);

        games = rows.slice(1).map(r => ({
          name: r[idxName] || "",
          minPlayers: Number(r[idxMin]) || 1,
          maxPlayers: Number(r[idxMax]) || Number(r[idxMin]) || 99,
          timeText: r[idxTime] || "",
          time: parseTime(r[idxTime]),
          tags: splitTags(r[idxTags]),
          feature: r[idxFeature] || "",
          note: r[idxNote] || "",
          img: r[idxImg] || ""
        })).filter(g => g.name);

        const allTags = [...new Set(games.flatMap(g => g.tags))].sort();

        document.getElementById("tagFilter").innerHTML = allTags.map(tag => `
          <label class="tag-check">
            <input class="tagOption" type="checkbox" value="${safe(tag)}">
            ${safe(tag)}
          </label>
        `).join("");

        document.querySelectorAll("select, .tagOption").forEach(el => {
          el.addEventListener("input", filter);
          el.addEventListener("change", filter);
        });

        render(games);
      })
      .catch(() => {
        document.getElementById("grid").innerHTML = `
          <div class="empty-state">
            桌遊資料讀取失敗。請確認 Google 試算表是否已公開發布為 CSV。
          </div>
        `;
      });
  </script>

</body>
