<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鴉宅桌遊館</title>

<style>
body{
    margin:0;
    font-family:"Microsoft JhengHei",serif;
    background:#17100c;
    color:#f4e2bd;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top,#54351f 0%,#17100c 68%),
        url("https://www.transparenttextures.com/patterns/old-map.png");
    z-index:-1;
}

header{
    text-align:center;
    padding:55px 10px 36px;
    background:linear-gradient(90deg,#0f0906,#4a2a15,#0f0906);
    border-bottom:4px solid #f0c35a;
    box-shadow:0 4px 28px rgba(0,0,0,.75);
}

.logo-title{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.raven-icon{
    width:82px;
    height:82px;
    filter:
        drop-shadow(0 0 10px rgba(255,216,107,.8))
        drop-shadow(0 0 22px rgba(240,195,90,.45));
}

header h1{
    margin:0;
    font-size:68px;
    letter-spacing:9px;
    color:#ffe08a;
    text-shadow:
        0 0 10px rgba(255,224,138,.95),
        0 0 25px rgba(255,224,138,.45),
        4px 4px 0 #241106;
}

header p{
    margin-top:12px;
    font-size:26px;
    letter-spacing:5px;
    color:#ffe8b8;
    text-shadow:0 0 10px rgba(0,0,0,.9);
}

.official-link{
    display:inline-block;
    margin-top:16px;
    padding:9px 20px;
    border-radius:999px;
    background:#1f8f45;
    color:white;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 15px rgba(31,143,69,.45);
}

.tabs{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}

.tab{
    padding:10px 20px;
    border:1px solid #d8aa4c;
    background:#2b2119;
    color:#f4e2bd;
    border-radius:8px;
    cursor:pointer;
}

.tab.active{
    background:#d8aa4c;
    color:#1b130d;
    font-weight:bold;
}

.filter-box{
    max-width:1150px;
    margin:0 auto 18px;
    padding:15px;
    background:rgba(43,33,25,.9);
    border:1px solid #8e6b35;
    border-radius:12px;
}

.filter-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

select{
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #d8aa4c;
    background:#241a13;
    color:#f4e2bd;
}

.tag-filter{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
    justify-content:center;
}

.tag-check{
    border:1px solid #7e6131;
    padding:5px 10px;
    border-radius:999px;
    cursor:pointer;
    background:#1f1711;
    font-size:13px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(245px,1fr));
    gap:18px;
    max-width:1200px;
    margin:20px auto;
    padding:0 15px;
}

.card{
    position:relative;
    background:#2b2119;
    border:1px solid #9a7436;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 18px rgba(0,0,0,.38);
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 28px rgba(216,170,76,.25);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
    object-position:center;
    background:#140d09;
    padding:6px;
    box-sizing:border-box;
}

.card-body{
    padding:13px;
}

.card h3{
    margin:0 0 8px;
    color:#ffd86b;
}

.tag{
    display:inline-block;
    padding:3px 7px;
    margin:3px;
    border-radius:5px;
    background:#5a3c20;
    color:#f4e2bd;
    font-size:12px;
}

.info{
    font-size:13px;
    color:#d9c49b;
    margin-top:6px;
}

.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:#d8aa4c;
    color:#1b130d;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.rules-wrap{
    max-width:880px;
    margin:25px auto;
    padding:22px;
    background:linear-gradient(145deg,#2b2119,#1a120d);
    border:2px solid #d8aa4c;
    border-radius:18px;
    box-shadow:0 8px 30px rgba(0,0,0,.55);
}

.rules-title{
    text-align:center;
    color:#ffd86b;
    font-size:30px;
    letter-spacing:4px;
    margin:0 0 18px;
}

.rule-img{
    width:100%;
    border:2px solid #7e6131;
    border-radius:12px;
    background:#1a120d;
    filter:sepia(.2) contrast(1.04) brightness(.92);
    box-shadow:inset 0 0 25px rgba(0,0,0,.5),0 6px 22px rgba(0,0,0,.55);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.78);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:99;
}

.modal-content{
    max-width:850px;
    width:100%;
    background:#241a13;
    border:2px solid #d8aa4c;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 35px rgba(216,170,76,.35);
    position:relative;
}

.modal-content img{
    width:100%;
    max-height:390px;
    object-fit:contain;
    object-position:center;
    background:#120c08;
    padding:10px;
    box-sizing:border-box;
}

.modal-body{
    padding:22px;
}

.modal-body h2{
    color:#ffd86b;
    font-size:36px;
    margin:0 0 10px;
}

.youtube-btn{
    display:inline-block;
    margin-top:16px;
    padding:10px 18px;
    background:#b62222;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.close{
    position:absolute;
    top:10px;
    right:14px;
    font-size:32px;
    color:#ffd86b;
    cursor:pointer;
    z-index:100;
}

.hidden{display:none;}

@media(max-width:600px){
    header h1{font-size:40px;letter-spacing:4px;}
    header p{font-size:19px;}
    .raven-icon{width:54px;height:54px;}
}
</style>
</head>

<body>

<header>
    <div class="logo-title">
        <svg class="raven-icon" viewBox="0 0 100 100">
            <path d="M18 72 C28 49 42 35 62 24 C55 23 46 25 38 31 C49 15 68 11 82 19 C72 24 69 33 73 42 C77 50 70 61 58 65 C48 68 36 73 24 90 C26 80 31 72 38 66 C31 64 25 66 18 72Z" fill="#050505"/>
            <path d="M77 23 L96 30 L78 37 Z" fill="#050505"/>
            <circle cx="72" cy="27" r="3" fill="#ffd86b"/>
            <path d="M38 31 C24 30 12 22 6 10 C19 14 32 18 45 28 Z" fill="#050505"/>
        </svg>
        <h1>鴉宅桌遊館</h1>
    </div>
    <p>新莊在地桌遊團</p>
    <a class="official-link" href="https://line.me/R/ti/p/@187jgojd" target="_blank">加入官方帳號 @187jgojd</a>
</header>

<div class="tabs">
    <button class="tab active" onclick="switchTab('games', this)">🎲 桌遊列表</button>
    <button class="tab" onclick="switchTab('recommend', this)">👑 團長推薦</button>
    <button class="tab" onclick="switchTab('rules', this)">📜 注意事項</button>
</div>

<div id="filterBox" class="filter-box">
    <div class="filter-bar">
        <select id="playerFilter">
            <option value="">全部人數</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6+">6人以上</option>
        </select>

        <select id="timeFilter">
            <option value="">全部時間</option>
            <option value="30">30分鐘內</option>
            <option value="60">31–60分鐘</option>
            <option value="120">61分鐘以上</option>
        </select>
    </div>

    <div id="tagFilter" class="tag-filter"></div>
</div>

<div id="grid" class="grid"></div>

<div id="rules" class="rules-wrap hidden">
    <h2 class="rules-title">冒險者須知</h2>
    <img class="rule-img" src="https://i.meee.com.tw/vK19Mqx.png" alt="鴉宅桌遊館注意事項">
</div>

<div id="modal" class="modal hidden" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close" onclick="hideModal()">×</div>
        <img id="modalImg" src="">
        <div class="modal-body">
            <h2 id="modalName"></h2>
            <div id="modalMeta" class="info"></div>
            <div id="modalTags"></div>
            <p id="modalFeature" class="info"></p>
            <a id="youtubeLink" class="youtube-btn" target="_blank">▶ YouTube 介紹影片</a>
        </div>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";

let games = [];
let currentTab = "games";

function parseCSV(text){
    const rows = [];
    let row = [], cell = "", quote = false;

    for(let i=0;i<text.length;i++){
        const c = text[i], n = text[i+1];

        if(c === '"' && quote && n === '"'){
            cell += '"'; i++;
        }else if(c === '"'){
            quote = !quote;
        }else if(c === "," && !quote){
            row.push(cell.trim()); cell = "";
        }else if((c === "\n" || c === "\r") && !quote){
            if(cell || row.length){
                row.push(cell.trim());
                rows.push(row);
                row = []; cell = "";
            }
            if(c === "\r" && n === "\n") i++;
        }else{
            cell += c;
        }
    }

    if(cell || row.length){
        row.push(cell.trim());
        rows.push(row);
    }

    return rows;
}

function splitTags(str){
    return (str || "").split(/[|,，、]/).map(t=>t.trim()).filter(Boolean);
}

function parseTime(str){
    const nums = String(str || "").match(/\d+/g);
    if(!nums) return 0;
    return Math.max(...nums.map(Number));
}

function idx(headers, name){
    return headers.findIndex(h => h.trim() === name);
}

function render(list){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    if(list.length === 0){
        grid.innerHTML = `<div class="info">沒有符合條件的桌遊。</div>`;
        return;
    }

    list.forEach(g=>{
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openModal(g);

        card.innerHTML = `
            ${g.note.includes("推薦") ? `<div class="badge">👑 推薦</div>` : ""}
            <img src="${g.img || 'https://picsum.photos/400/250'}" alt="${g.name}">
            <div class="card-body">
                <h3>${g.name}</h3>
                <div class="info">👥 ${g.minPlayers}–${g.maxPlayers}人 ｜ ⏱ ${g.timeText}</div>
                <div>${g.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
                <div class="info">${g.feature || ""}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

function filter(){
    let list = [...games];
    const player = document.getElementById("playerFilter").value;
    const time = document.getElementById("timeFilter").value;
    const checkedTags = [...document.querySelectorAll(".tagOption:checked")].map(i=>i.value);

    if(currentTab === "recommend"){
        list = list.filter(g => g.note.includes("推薦"));
    }

    if(player){
        if(player === "6+"){
            list = list.filter(g => g.maxPlayers >= 6);
        }else{
            const p = Number(player);
            list = list.filter(g => p >= g.minPlayers && p <= g.maxPlayers);
        }
    }

    if(time === "30") list = list.filter(g => g.time <= 30);
    if(time === "60") list = list.filter(g => g.time > 30 && g.time <= 60);
    if(time === "120") list = list.filter(g => g.time > 60);

    if(checkedTags.length){
        list = list.filter(g => checkedTags.every(tag => g.tags.includes(tag)));
    }

    render(list);
}

function switchTab(tab, btn){
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    btn.classList.add("active");

    const filterBox = document.getElementById("filterBox");
    const grid = document.getElementById("grid");
    const rules = document.getElementById("rules");

    if(tab === "rules"){
        filterBox.classList.add("hidden");
        grid.classList.add("hidden");
        rules.classList.remove("hidden");
    }else{
        filterBox.classList.remove("hidden");
        grid.classList.remove("hidden");
        rules.classList.add("hidden");
        filter();
    }
}

function openModal(g){
    document.getElementById("modalImg").src = g.img || "https://picsum.photos/800/400";
    document.getElementById("modalName").textContent = g.name;
    document.getElementById("modalMeta").textContent = `適合人數：${g.minPlayers}–${g.maxPlayers}人　｜　遊戲時間：${g.timeText}`;
    document.getElementById("modalTags").innerHTML = g.tags.map(t=>`<span class="tag">${t}</span>`).join("");
    document.getElementById("modalFeature").textContent = `特色：${g.feature || "尚未填寫"}`;
    document.getElementById("youtubeLink").href = `https://www.youtube.com/results?search_query=${encodeURIComponent(g.name + " 桌遊 教學 介紹")}`;
    document.getElementById("modal").classList.remove("hidden");
}

function hideModal(){
    document.getElementById("modal").classList.add("hidden");
}

function closeModal(e){
    if(e.target.id === "modal") hideModal();
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
    const rows = parseCSV(text);
    const headers = rows[0];

    const idxName = idx(headers,"桌遊名稱");
    const idxMin = idx(headers,"最少人數");
    const idxMax = idx(headers,"最多人數");
    const idxTime = idx(headers,"時間");
    const idxTags = idx(headers,"標籤");
    const idxFeature = idx(headers,"特點");
    const idxNote = idx(headers,"備註");
    const idxImg = idx(headers,"圖片");

    games = rows.slice(1).map(r=>({
        name:r[idxName] || "",
        minPlayers:Number(r[idxMin]) || 1,
        maxPlayers:Number(r[idxMax]) || Number(r[idxMin]) || 99,
        timeText:r[idxTime] || "",
        time:parseTime(r[idxTime]),
        tags:splitTags(r[idxTags]),
        feature:r[idxFeature] || "",
        note:r[idxNote] || "",
        img:r[idxImg] || ""
    })).filter(g=>g.name);

    const allTags = [...new Set(games.flatMap(g=>g.tags))].sort();

    document.getElementById("tagFilter").innerHTML = allTags.map(tag=>`
        <label class="tag-check">
            <input class="tagOption" type="checkbox" value="${tag}">
            ${tag}
        </label>
    `).join("");

    document.querySelectorAll("select,input").forEach(el=>{
        el.addEventListener("input", filter);
        el.addEventListener("change", filter);
    });

    render(games);
});
</script>

</body>
</html>
