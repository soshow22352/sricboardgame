<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鴉宅桌遊館</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      color: #3b2618;
      background:
        radial-gradient(circle at top, rgba(255, 245, 220, 0.35), transparent 35%),
        linear-gradient(135deg, #2a180d, #6b4326 45%, #2f1b10);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.035) 0px,
          rgba(255,255,255,0.035) 2px,
          rgba(0,0,0,0.055) 5px,
          rgba(0,0,0,0.055) 14px
        );
      opacity: 0.85;
    }

    header {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 14px 8px;
      text-align: center;
    }

    .hero-box {
      padding: 8px;
      border-radius: 26px;
      background: linear-gradient(135deg, #e8c58e, #7b4a29, #d6a968);
      box-shadow: 0 18px 45px rgba(0,0,0,0.38);
    }

    .hero-box img {
      width: 100%;
      display: block;
      border-radius: 20px;
      border: none;
    }

    .site-subtitle {
      margin-top: 14px;
      color: #fff1cf;
      letter-spacing: 0.2em;
      font-size: 14px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      margin: 12px auto 22px;
      background: rgba(45, 27, 15, 0.82);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,240,210,0.22);
      border-bottom: 1px solid rgba(255,240,210,0.18);
    }

    .tabs button,
    .tabs a {
      border: 1px solid rgba(198, 151, 91, 0.75);
      border-radius: 999px;
      padding: 10px 18px;
      background: linear-gradient(180deg, #fff4dc, #e5c18c);
      color: #3b2416;
      font-family: inherit;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
      transition: 0.22s ease;
    }

    .tabs button:hover,
    .tabs a:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #fff9ea, #f1ce95);
    }

    .tabs button.active {
      background: linear-gradient(180deg, #80502e, #3a2113);
      color: #fff3d8;
    }

    .tabs a {
      background: linear-gradient(180deg, #8b3d2b, #5c2718);
      color: #fff3d8;
    }

    .filter-box {
      max-width: 1120px;
      margin: 0 auto 22px;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,248,232,0.96), rgba(226,201,160,0.95));
      border: 1px solid rgba(105, 65, 30, 0.35);
      box-shadow: 0 16px 38px rgba(0,0,0,0.28);
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    select {
      min-width: 150px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(105, 65, 30, 0.45);
      background: #fff8ea;
      color: #3b2416;
      font-family: inherit;
      font-weight: 700;
    }

    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .tag-check {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(105, 65, 30, 0.25);
      background: rgba(255,255,255,0.45);
      font-size: 13px;
      cursor: pointer;
    }

    .tag-check input {
      accent-color: #7b4a29;
    }

    .grid {
      max-width: 1200px;
      margin: 24px auto 52px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: linear-gradient(180deg, #fff6e3, #e3c294);
      border: 1px solid rgba(105, 65, 30, 0.32);
      box-shadow: 0 16px 36px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-7px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.38);
    }

    .card img {
      width: 100%;
      height: 190px;
      display: block;
      object-fit: contain;
      padding: 12px;
      background: radial-gradient(circle, #fff9eb 0%, #d9b176 80%);
    }

    .card-body {
      padding: 15px 16px 18px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.35;
      color: #3b2416;
    }

    .info {
      font-size: 13px;
      line-height: 1.65;
      color: #735033;
      margin-top: 7px;
    }

    .tag {
      display: inline-block;
      margin: 4px 4px 0 0;
      padding: 4px 9px;
      border-radius: 999px;
      background: #7c4a29;
      color: #fff3d8;
      font-size: 12px;
      font-weight: 700;
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      padding: 6px 10px;
      border-radius: 999px;
      background: #8d2f20;
      color: #fff4de;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 6px 14px rgba(0,0,0,0.26);
    }

    .rules-wrap {
      max-width: 900px;
      margin: 28px auto 52px;
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, #fff6e3, #dfbf8f);
      border: 1px solid rgba(105, 65, 30, 0.35);
      box-shadow: 0 16px 38px rgba(0,0,0,0.3);
    }

    .rules-title {
      margin: 0 0 18px;
      text-align: center;
      color: #4a2a18;
      font-size: 34px;
      letter-spacing: 6px;
    }

    .rule-img {
      width: 100%;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(105, 65, 30, 0.3);
    }

    .photo-wall {
      max-width: 1200px;
      margin: 24px auto 52px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .photo-wall img {
      width: 100%;
      height: 225px;
      object-fit: cover;
      border-radius: 20px;
      border: 8px solid #fff3d8;
      box-shadow: 0 16px 36px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(26,13,5,0.78);
      backdrop-filter: blur(10px);
    }

    .modal-content {
      position: relative;
      width: 100%;
      max-width: 850px;
      overflow: hidden;
      border-radius: 24px;
      background: linear-gradient(180deg, #fff5df, #e4c79a);
      box-shadow: 0 28px 60px rgba(0,0,0,0.45);
    }

    .modal-content img {
      width: 100%;
      max-height: 410px;
      display: block;
      object-fit: contain;
      padding: 14px;
      background: radial-gradient(circle, #fff8e8 0%, #dcb987 82%);
    }

    .modal-body {
      padding: 22px 24px 26px;
    }

    .modal-body h2 {
      margin: 0 0 8px;
      color: #3b2416;
      font-size: 34px;
    }

    .youtube-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 18px;
      border-radius: 999px;
      background: #8d2f20;
      color: white;
      text-decoration: none;
      font-weight: 900;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 100;
      width: 38px;
      height: 38px;
      line-height: 34px;
      text-align: center;
      border-radius: 50%;
      background: rgba(59,36,22,0.86);
      color: #fff4de;
      font-size: 30px;
      cursor: pointer;
    }

    .photo-modal-content {
      max-width: 1000px;
      background: transparent;
      box-shadow: none;
    }

    .photo-modal-content img {
      max-height: 86vh;
      border-radius: 20px;
      border: 8px solid #fff3d8;
      background: #fff3d8;
      padding: 0;
    }

    .hidden {
      display: none !important;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 35px 20px;
      border-radius: 22px;
      background: rgba(255,248,232,0.92);
      color: #5f3a20;
      box-shadow: 0 16px 36px rgba(0,0,0,0.3);
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
        gap: 14px;
      }

      .card img {
        height: 145px;
      }

      .card h3 {
        font-size: 17px;
      }

      .tabs button,
      .tabs a {
        padding: 9px 13px;
        font-size: 14px;
      }

      .rules-wrap {
        margin-left: 12px;
        margin-right: 12px;
        padding: 16px;
      }

      .rules-title {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="hero-box">
      <img src="images/banner/banner.jpg" alt="鴉宅桌遊館" onerror="this.style.display='none'">
    </div>
    <div class="site-subtitle">WOODEN CAFE BOARDGAME SPACE</div>
  </header>

  <nav class="tabs">
    <button class="active" onclick="switchTab('games', this)">桌遊列表</button>
    <button onclick="switchTab('recommend', this)">團長推薦</button>
    <button onclick="switchTab('photos', this)">活動相片</button>
    <button onclick="switchTab('rules', this)">注意事項</button>
    <a href="https://line.me/R/ti/p/@187jgojd" target="_blank">加入官方帳號</a>
  </nav>

  <section id="filterBox" class="filter-box">
    <div class="filter-bar">
      <select id="playerFilter">
        <option value="">全部人數</option>
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6+">6人以上</option>
      </select>

      <select id="timeFilter">
        <option value="">全部時間</option>
        <option value="30">30分鐘內</option>
        <option value="60">31–60分鐘</option>
        <option value="120">61分鐘以上</option>
      </select>
    </div>

    <div id="tagFilter" class="tag-filter"></div>
  </section>

  <main id="grid" class="grid"></main>

  <section id="photos" class="photo-wall hidden"></section>

  <section id="rules" class="rules-wrap hidden">
    <h2 class="rules-title">冒險者須知</h2>
    <img class="rule-img" src="images/rules/rules-v2.png" alt="鴉宅桌遊館注意事項" onerror="this.outerHTML='<div class=&quot;empty-state&quot;>注意事項圖片尚未上傳或路徑錯誤。</div>'">
  </section>

  <div id="modal" class="modal hidden" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="close" onclick="hideModal()">×</div>
      <img id="modalImg" src="" alt="">
      <div class="modal-body">
        <h2 id="modalName"></h2>
        <div id="modalMeta" class="info"></div>
        <div id="modalTags"></div>
        <p id="modalFeature" class="info"></p>
        <a id="youtubeLink" class="youtube-btn" target="_blank">▶ YouTube 介紹影片</a>
      </div>
    </div>
  </div>

  <div id="photoModal" class="modal hidden" onclick="hidePhotoModal()">
    <div class="modal-content photo-modal-content">
      <div class="close" onclick="hidePhotoModal()">×</div>
      <img id="photoModalImg" src="" alt="活動相片">
    </div>
  </div>

  <script>
    const GAME_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";
    const PHOTO_CSV_URL = "https://docs.google.com/spreadsheets/d/11B2F_OC-8NTJyalXLWZc6yYIPHyzSKej0V4u3QpbGDg/gviz/tq?tqx=out:csv&sheet=%E6%B4%BB%E5%8B%95%E7%9B%B8%E7%89%87";

    let games = [];
    let currentTab = "games";
    let photosLoaded = false;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quote = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"' && quote && next === '"') {
          cell += '"';
          i++;
        } else if (c === '"') {
          quote = !quote;
        } else if (c === "," && !quote) {
          row.push(cell.trim());
          cell = "";
        } else if ((c === "\n" || c === "\r") && !quote) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
          if (c === "\r" && next === "\n") i++;
        } else {
          cell += c;
        }
      }

      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function safe(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getIndex(headers, possibleNames) {
      for (const name of possibleNames) {
        const found = headers.findIndex(h => String(h || "").trim() === name);
        if (found !== -1) return found;
      }
      return -1;
    }

    function normalizeImageUrl(url) {
      if (!url) return "";
      url = String(url).trim();

      const driveFile = url.match(/\/file\/d\/([^/]+)/);
      const driveId = url.match(/[?&]id=([^&]+)/);

      if (driveFile) {
        return `https://drive.google.com/thumbnail?id=${driveFile[1]}&sz=w1600`;
      }

      if (driveId) {
        return `https://drive.google.com/thumbnail?id=${driveId[1]}&sz=w1600`;
      }

      return url;
    }

    function splitTags(str) {
      return String(str || "")
        .split(/[|,，、]/)
        .map(t => t.trim())
        .filter(Boolean);
    }

    function parseTime(str) {
      const nums = String(str || "").match(/\d+/g);
      if (!nums) return 0;
      return Math.max(...nums.map(Number));
    }

    function render(list) {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state">沒有符合條件的桌遊。</div>`;
        return;
      }

      list.forEach(g => {
        const card = document.createElement("article");
        card.className = "card";
        card.onclick = () => openModal(g);

        card.innerHTML = `
          ${g.note.includes("推薦") ? `<div class="badge">團長推薦</div>` : ""}
          <img src="${safe(normalizeImageUrl(g.img))}" alt="${safe(g.name)}" loading="lazy" onerror="this.src='https://picsum.photos/500/350?blur=1'">
          <div class="card-body">
            <h3>${safe(g.name)}</h3>
            <div class="info">${g.minPlayers}–${g.maxPlayers}人 ｜ ⏱ ${safe(g.timeText)}</div>
            <div>${g.tags.map(t => `<span class="tag">${safe(t)}</span>`).join("")}</div>
            <div class="info">${safe(g.feature)}</div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function filter() {
      let list = [...games];

      const player = document.getElementById("playerFilter").value;
      const time = document.getElementById("timeFilter").value;
      const checkedTags = [...document.querySelectorAll(".tagOption:checked")].map(i => i.value);

      if (currentTab === "recommend") {
        list = list.filter(g => g.note.includes("推薦"));
      }

      if (player) {
        if (player === "6+") {
          list = list.filter(g => g.maxPlayers >= 6);
        } else {
          const p = Number(player);
          list = list.filter(g => p >= g.minPlayers && p <= g.maxPlayers);
        }
      }

      if (time === "30") list = list.filter(g => g.time <= 30);
      if (time === "60") list = list.filter(g => g.time > 30 && g.time <= 60);
      if (time === "120") list = list.filter(g => g.time > 60);

      if (checkedTags.length) {
        list = list.filter(g => checkedTags.every(tag => g.tags.includes(tag)));
      }

      render(list);
    }

    function switchTab(tab, btn) {
      currentTab = tab;

      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const isStatic = tab === "rules" || tab === "photos";

      document.getElementById("filterBox").classList.toggle("hidden", isStatic);
      document.getElementById("grid").classList.toggle("hidden", isStatic);
      document.getElementById("rules").classList.toggle("hidden", tab !== "rules");
      document.getElementById("photos").classList.toggle("hidden", tab !== "photos");

      if (tab === "photos") loadPhotos();
      if (tab === "games" || tab === "recommend") filter();
    }

    function openModal(g) {
      document.getElementById("modalImg").src = normalizeImageUrl(g.img) || "https://picsum.photos/800/500?blur=1";
      document.getElementById("modalName").textContent = g.name;
      document.getElementById("modalMeta").textContent = `適合人數：${g.minPlayers}–${g.maxPlayers}人 ｜ 遊戲時間：${g.timeText}`;
      document.getElementById("modalTags").innerHTML = g.tags.map(t => `<span class="tag">${safe(t)}</span>`).join("");
      document.getElementById("modalFeature").textContent = `特色：${g.feature || "尚未填寫"}`;
      document.getElementById("youtubeLink").href = `https://www.youtube.com/results?search_query=${encodeURIComponent(g.name + " 桌遊 教學 介紹")}`;
      document.getElementById("modal").classList.remove("hidden");
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function openPhotoModal(src) {
      document.getElementById("photoModalImg").src = src;
      document.getElementById("photoModal").classList.remove("hidden");
    }

    function hidePhotoModal() {
      document.getElementById("photoModal").classList.add("hidden");
    }

    function loadPhotos() {
      const photosBox = document.getElementById("photos");

      if (photosLoaded) return;

      photosBox.innerHTML = `<div class="empty-state">活動相片載入中...</div>`;

      fetch(PHOTO_CSV_URL)
        .then(r => r.text())
        .then(text => {
          const rows = parseCSV(text);
          const headers = rows[0] || [];
          const imgIndex = getIndex(headers, ["圖片", "照片", "圖片網址", "相片"]);

          if (imgIndex === -1) {
            photosBox.innerHTML = `<div class="empty-state">找不到活動相片欄位。</div>`;
            return;
          }

          const photoList = rows.slice(1)
            .map(r => normalizeImageUrl(r[imgIndex]))
            .filter(Boolean);

          if (!photoList.length) {
            photosBox.innerHTML = `<div class="empty-state">目前尚無活動相片。</div>`;
            return;
          }

          photosBox.innerHTML = "";

          photoList.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.loading = "lazy";
            img.alt = "活動相片";
            img.onclick = () => openPhotoModal(src);
            img.onerror = () => img.style.display = "none";
            photosBox.appendChild(img);
          });

          photosLoaded = true;
        })
        .catch(() => {
          photosBox.innerHTML = `<div class="empty-state">活動相片讀取失敗。</div>`;
        });
    }

    fetch(GAME_CSV_URL)
      .then(r => r.text())
      .then(text => {
        const rows = parseCSV(text);
        const headers = rows[0] || [];

        const idxName = getIndex(headers, ["桌遊名稱", "名稱", "遊戲名稱"]);
        const idxMin = getIndex(headers, ["最少人數", "最小人數"]);
        const idxMax = getIndex(headers, ["最多人數", "最大人數"]);
        const idxTime = getIndex(headers, ["時間", "遊戲時間"]);
        const idxTags = getIndex(headers, ["標籤", "類型", "分類"]);
        const idxFeature = getIndex(headers, ["特點", "特色", "介紹"]);
        const idxNote = getIndex(headers, ["備註", "推薦"]);
        const idxImg = getIndex(headers, ["圖片", "圖片網址", "封面"]);

        games = rows.slice(1).map(r => ({
          name: r[idxName] || "",
          minPlayers: Number(r[idxMin]) || 1,
          maxPlayers: Number(r[idxMax]) || Number(r[idxMin]) || 99,
          timeText: r[idxTime] || "",
          time: parseTime(r[idxTime]),
          tags: splitTags(r[idxTags]),
          feature: r[idxFeature] || "",
          note: r[idxNote] || "",
          img: r[idxImg] || ""
        })).filter(g => g.name);

        const allTags = [...new Set(games.flatMap(g => g.tags))].sort();

        document.getElementById("tagFilter").innerHTML = allTags.map(tag => `
          <label class="tag-check">
            <input class="tagOption" type="checkbox" value="${safe(tag)}">
            ${safe(tag)}
          </label>
        `).join("");

        document.querySelectorAll("select, .tagOption").forEach(el => {
          el.addEventListener("input", filter);
          el.addEventListener("change", filter);
        });

        render(games);
      })
      .catch(() => {
        document.getElementById("grid").innerHTML = `
          <div class="empty-state">
            桌遊資料讀取失敗。請確認 Google 試算表是否已公開發布為 CSV。
          </div>
        `;
