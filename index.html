<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鴉宅桌遊館收藏</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f5f1e8;
}

header{
    background:#3b2f2a;
    color:white;
    padding:25px;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.card h3{
    margin:0 0 8px 0;
}

.tag{
    display:inline-block;
    padding:3px 8px;
    background:#eee;
    border-radius:8px;
    font-size:12px;
    margin-right:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
    <h1>🎲 鴉宅桌遊館收藏</h1>
    <p>新莊自宅桌遊團</p>
</header>
<div style="max-width:1100px;margin:20px auto;padding:0 20px;">

    <div style="display:flex;flex-wrap:wrap;gap:10px;">

        <!-- 類型 -->
        <select id="typeFilter">
            <option value="">全部類型</option>
        </select>

        <!-- 人數 -->
        <select id="playerFilter">
            <option value="">全部人數</option>
            <option value="2-4">2-4人</option>
            <option value="5-8">5-8人</option>
            <option value="9+">9人以上</option>
        </select>

        <!-- 時間 -->
        <select id="timeFilter">
            <option value="">全部時間</option>
            <option value="30">30分鐘內</option>
            <option value="60">30-60分鐘</option>
            <option value="120">60分鐘以上</option>
        </select>

        <!-- 搜尋 -->
        <input id="searchInput" placeholder="搜尋桌遊..." 
        style="padding:6px;border-radius:6px;border:1px solid #ccc;">

    </div>

</div>
<div class="container">
    <div id="games" class="grid"></div>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";

fetch(CSV_URL)
.then(res => res.text())
let allGames = [];

    function renderGames(list){

    const container = document.getElementById("games");
    container.innerHTML = "";

    list.forEach(g => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${g.img || 'https://picsum.photos/300/400'}" 
            style="width:100%;height:180px;object-fit:cover;border-radius:10px 10px 0 0;">

            <div style="padding:10px;">
                <h3>${g.name}</h3>
                <div>👥 ${g.players}</div>
                <div>⏱ ${g.time} 分</div>

                <div class="tag">${g.type}</div>
                <div class="tag">${g.difficulty}</div>

                <div style="font-size:13px;color:#666;margin-top:6px;">
                    ${g.feature || ""}
                </div>
            </div>
        `;

        container.appendChild(card);
    });
}

    function initFilters(){

    const typeSet = new Set(allGames.map(g => g.type));

    const typeFilter = document.getElementById("typeFilter");

    typeSet.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        typeFilter.appendChild(opt);
    });

    document.querySelectorAll("select, input")
    .forEach(el => el.addEventListener("change", filterGames));

    document.getElementById("searchInput")
    .addEventListener("input", filterGames);
}

    function filterGames(){

    const type = document.getElementById("typeFilter").value;
    const player = document.getElementById("playerFilter").value;
    const time = document.getElementById("timeFilter").value;
    const search = document.getElementById("searchInput").value.toLowerCase();

    let filtered = allGames;

    // 類型
    if(type){
        filtered = filtered.filter(g => g.type === type);
    }

    // 搜尋
    if(search){
        filtered = filtered.filter(g => 
            g.name.toLowerCase().includes(search)
        );
    }

    // 時間
    if(time === "30"){
        filtered = filtered.filter(g => g.time <= 30);
    }
    if(time === "60"){
        filtered = filtered.filter(g => g.time > 30 && g.time <= 60);
    }
    if(time === "120"){
        filtered = filtered.filter(g => g.time > 60);
    }

    renderGames(filtered);
}
fetch(CSV_URL)
.then(res => res.text())
.then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));
    const headers = rows[0];

    const games = rows.slice(1).map(g => {
        return {
            name: g[0],
            players: g[1],
            time: parseInt(g[2]) || 0,
            type: g[3],
            difficulty: g[4],
            feature: g[5],
            note: g[6],
            img: g[7]
        };
    });

    allGames = games;

    initFilters();
    renderGames(games);
});

    const rows = data.split("\n").map(r => r.split(","));

    const headers = rows[0];
    const games = rows.slice(1);

    const container = document.getElementById("games");

    games.forEach(g => {

        const name = g[0];
        const players = g[1];
        const time = g[2];
        const type = g[3];
        const difficulty = g[4];
        const feature = g[5];
        const note = g[6];
        const img = g[7];

        if(!name) return;

        const card = document.createElement("div");
        card.className = "card";

      card.innerHTML = `
    <img src="${img || 'https://picsum.photos/300/400'}" style="width:100%;height:200px;object-fit:cover;border-radius:10px 10px 0 0;">
    
    <div style="padding:10px;">
        <h3>${name}</h3>
        <div>👥 ${players}</div>
        <div>⏱ ${time}</div>

        <div class="tag">${type}</div>
        <div class="tag">${difficulty}</div>

        <div style="margin-top:8px;font-size:13px;color:#555;">
            ${feature || ""}
        </div>
    </div>
`;

        container.appendChild(card);
    });

});

</script>

</body>
</html>
