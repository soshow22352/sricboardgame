<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鴉宅桌遊館</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=MedievalSharp&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#120c08;color:#f6e2b8;font-family:"Noto Serif TC",serif;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at top,#54351f 0%,#120c08 70%),url("https://www.transparenttextures.com/patterns/old-map.png");z-index:-1;}

header{
    text-align:center;
    padding:18px 10px 8px;
}

.hero-banner{
    width:100%;
    max-width:1150px;
    height:260px;
    object-fit:cover;
    object-position:center;
    display:block;
    margin:auto;
    border:2px solid #b89045;
    border-radius:18px;
    box-shadow:0 0 30px rgba(0,0,0,.6),0 0 20px rgba(216,170,76,.2);
}

.tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:20px 0;}
.tab,.official-tab{
    padding:11px 22px;
    border:1px solid #d8aa4c;
    background:#2b2119;
    color:#f4e2bd;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    font-size:16px;
    font-family:"Noto Serif TC",serif;
}
.tab.active{
    background:#d8aa4c;
    color:#1b130d;
    font-weight:bold;
}
.official-tab:hover,.tab:hover{
    background:#3a2a1e;
    box-shadow:0 0 12px rgba(216,170,76,.35);
}

.filter-box{max-width:1150px;margin:0 auto 18px;padding:15px;background:rgba(43,33,25,.9);border:1px solid #8e6b35;border-radius:12px;}
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
select{padding:8px 10px;border-radius:6px;border:1px solid #d8aa4c;background:#241a13;color:#f4e2bd;}
.tag-filter{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center;}
.tag-check{border:1px solid #7e6131;padding:5px 10px;border-radius:999px;background:#1f1711;font-size:13px;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:18px;max-width:1200px;margin:20px auto;padding:0 15px;}
.card{position:relative;background:#2b2119;border:1px solid #9a7436;border-radius:12px;overflow:hidden;box-shadow:0 5px 18px rgba(0,0,0,.38);cursor:pointer;transition:.2s;}
.card:hover{transform:translateY(-5px);box-shadow:0 8px 28px rgba(216,170,76,.28);}
.card img{width:100%;height:180px;object-fit:contain;object-position:center;background:#120c08;padding:8px;box-sizing:border-box;}
.card-body{padding:13px;}
.card h3{margin:0 0 8px;color:#ffd86b;}
.tag{display:inline-block;padding:3px 7px;margin:3px;border-radius:5px;background:#5a3c20;color:#f4e2bd;font-size:12px;}
.info{font-size:13px;color:#d9c49b;margin-top:6px;}
.badge{position:absolute;top:10px;right:10px;background:#d8aa4c;color:#1b130d;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;}

.rules-wrap{max-width:880px;margin:25px auto;padding:22px;background:linear-gradient(145deg,#2b2119,#1a120d);border:2px solid #d8aa4c;border-radius:18px;}
.rules-title{text-align:center;color:#ffd86b;font-size:34px;letter-spacing:4px;}
.rule-img{width:100%;border:2px solid #d8aa4c;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.6);}

.photo-wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;max-width:1200px;margin:20px auto;padding:0 15px;}
.photo-wall img{width:100%;height:220px;object-fit:cover;border-radius:12px;border:1px solid #9a7436;box-shadow:0 5px 18px rgba(0,0,0,.4);cursor:pointer;transition:.2s;}
.photo-wall img:hover{transform:scale(1.03);box-shadow:0 8px 28px rgba(216,170,76,.28);}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;padding:20px;z-index:99;}
.modal-content{max-width:850px;width:100%;background:#241a13;border:2px solid #d8aa4c;border-radius:16px;overflow:hidden;position:relative;}
.modal-content img{width:100%;max-height:390px;object-fit:contain;background:#120c08;padding:10px;box-sizing:border-box;}
.photo-modal-content{max-width:1000px;background:transparent;border:none;box-shadow:none;}
.photo-modal-content img{max-height:85vh;border:2px solid #d8aa4c;border-radius:14px;background:#120c08;}
.modal-body{padding:22px;}
.modal-body h2{color:#ffd86b;font-size:36px;}
.youtube-btn{display:inline-block;margin-top:16px;padding:10px 18px;background:#b62222;color:white;border-radius:8px;text-decoration:none;font-weight:bold;}
.close{position:absolute;top:10px;right:14px;font-size:32px;color:#ffd86b;cursor:pointer;z-index:100;}
.hidden{display:none;}

@media(max-width:600px){
    .hero-banner{height:145px;border-radius:12px;}
    .tab,.official-tab{padding:9px 14px;font-size:14px;}
}
</style>
</head>

<body>

<header>
    <img src="images/banner/banner.jpg" class="hero-banner" alt="鴉宅桌遊館">
</header>

<div class="tabs">
    <button class="tab active" onclick="switchTab('games', this)">🎲 桌遊列表</button>
    <button class="tab" onclick="switchTab('recommend', this)">👑 團長推薦</button>
    <button class="tab" onclick="switchTab('photos', this)">📷 活動相片</button>
    <button class="tab" onclick="switchTab('rules', this)">📜 注意事項</button>
    <a class="official-tab" href="https://line.me/R/ti/p/@187jgojd" target="_blank">加入官方帳號</a>
</div>

<div id="filterBox" class="filter-box">
    <div class="filter-bar">
        <select id="playerFilter">
            <option value="">全部人數</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6+">6人以上</option>
        </select>

        <select id="timeFilter">
            <option value="">全部時間</option>
            <option value="30">30分鐘內</option>
            <option value="60">31–60分鐘</option>
            <option value="120">61分鐘以上</option>
        </select>
    </div>

    <div id="tagFilter" class="tag-filter"></div>
</div>

<div id="grid" class="grid"></div>
<div id="photos" class="photo-wall hidden"></div>

<div id="rules" class="rules-wrap hidden">
    <h2 class="rules-title">冒險者須知</h2>
    <img class="rule-img" src="images/rules/rules-v2.png" alt="鴉宅桌遊館注意事項">
</div>

<div id="modal" class="modal hidden" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close" onclick="hideModal()">×</div>
        <img id="modalImg" src="">
        <div class="modal-body">
            <h2 id="modalName"></h2>
            <div id="modalMeta" class="info"></div>
            <div id="modalTags"></div>
            <p id="modalFeature" class="info"></p>
            <a id="youtubeLink" class="youtube-btn" target="_blank">▶ YouTube 介紹影片</a>
        </div>
    </div>
</div>

<div id="photoModal" class="modal hidden" onclick="hidePhotoModal()">
    <div class="modal-content photo-modal-content">
        <div class="close" onclick="hidePhotoModal()">×</div>
        <img id="photoModalImg" src="">
    </div>
</div>

<script>
const GAME_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";
const PHOTO_CSV_URL = "https://docs.google.com/spreadsheets/d/11B2F_OC-8NTJyalXLWZc6yYIPHyzSKej0V4u3QpbGDg/gviz/tq?tqx=out:csv&sheet=%E6%B4%BB%E5%8B%95%E7%9B%B8%E7%89%87";

let games = [];
let currentTab = "games";

function parseCSV(text){
    const rows = [];
    let row = [], cell = "", quote = false;

    for(let i=0;i<text.length;i++){
        const c = text[i], n = text[i+1];

        if(c === '"' && quote && n === '"'){cell += '"'; i++;}
        else if(c === '"'){quote = !quote;}
        else if(c === "," && !quote){row.push(cell.trim()); cell = "";}
        else if((c === "\n" || c === "\r") && !quote){
            if(cell || row.length){row.push(cell.trim()); rows.push(row); row = []; cell = "";}
            if(c === "\r" && n === "\n") i++;
        }else{cell += c;}
    }

    if(cell || row.length){row.push(cell.trim()); rows.push(row);}
    return rows;
}

function idx(headers, name){
    return headers.findIndex(h => h.trim() === name);
}

function splitTags(str){
    return (str || "").split(/[|,，、]/).map(t=>t.trim()).filter(Boolean);
}

function parseTime(str){
    const nums = String(str || "").match(/\d+/g);
    if(!nums) return 0;
    return Math.max(...nums.map(Number));
}

function normalizeImageUrl(url){
    if(!url) return "";
    url = url.trim();

    const driveMatch1 = url.match(/\/file\/d\/([^/]+)/);
    const driveMatch2 = url.match(/[?&]id=([^&]+)/);

    if(driveMatch1){
        return `https://drive.google.com/thumbnail?id=${driveMatch1[1]}&sz=w1600`;
    }

    if(driveMatch2){
        return `https://drive.google.com/thumbnail?id=${driveMatch2[1]}&sz=w1600`;
    }

    return url;
}

function render(list){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    if(list.length === 0){
        grid.innerHTML = `<div class="info">沒有符合條件的桌遊。</div>`;
        return;
    }

    list.forEach(g=>{
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openModal(g);

        card.innerHTML = `
            ${g.note.includes("推薦") ? `<div class="badge">👑 推薦</div>` : ""}
            <img src="${normalizeImageUrl(g.img) || 'https://picsum.photos/400/250'}" alt="${g.name}">
            <div class="card-body">
                <h3>${g.name}</h3>
                <div class="info">👥 ${g.minPlayers}–${g.maxPlayers}人 ｜ ⏱ ${g.timeText}</div>
                <div>${g.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
                <div class="info">${g.feature || ""}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

function loadPhotos(){
    const photosBox = document.getElementById("photos");
    photosBox.innerHTML = `<div class="info">活動相片載入中...</div>`;

    fetch(PHOTO_CSV_URL)
    .then(r => r.text())
    .then(text => {
        const rows = parseCSV(text);
        const headers = rows[0];
        const imgIndex = idx(headers, "圖片");

        if(imgIndex === -1){
            photosBox.innerHTML = `<div class="info">找不到「圖片」欄位。</div>`;
            return;
        }

        const photoList = rows.slice(1)
            .map(r => normalizeImageUrl(r[imgIndex]))
            .filter(Boolean);

        if(photoList.length === 0){
            photosBox.innerHTML = `<div class="info">目前尚無活動相片。</div>`;
            return;
        }

        photosBox.innerHTML = "";
        photoList.forEach(src=>{
            const img = document.createElement("img");
            img.src = src;
            img.loading = "lazy";
            img.onclick = () => openPhotoModal(src);
            img.onerror = () => img.style.display = "none";
            photosBox.appendChild(img);
        });
    })
    .catch(()=>{
        photosBox.innerHTML = `<div class="info">活動相片讀取失敗。</div>`;
    });
}

function filter(){
    let list = [...games];
    const player = document.getElementById("playerFilter").value;
    const time = document.getElementById("timeFilter").value;
    const checkedTags = [...document.querySelectorAll(".tagOption:checked")].map(i=>i.value);

    if(currentTab === "recommend"){
        list = list.filter(g => g.note.includes("推薦"));
    }

    if(player){
        if(player === "6+") list = list.filter(g => g.maxPlayers >= 6);
        else{
            const p = Number(player);
            list = list.filter(g => p >= g.minPlayers && p <= g.maxPlayers);
        }
    }

    if(time === "30") list = list.filter(g => g.time <= 30);
    if(time === "60") list = list.filter(g => g.time > 30 && g.time <= 60);
    if(time === "120") list = list.filter(g => g.time > 60);

    if(checkedTags.length){
        list = list.filter(g => checkedTags.every(tag => g.tags.includes(tag)));
    }

    render(list);
}

function switchTab(tab, btn){
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    btn.classList.add("active");

    document.getElementById("filterBox").classList.toggle("hidden", tab === "rules" || tab === "photos");
    document.getElementById("grid").classList.toggle("hidden", tab === "rules" || tab === "photos");
    document.getElementById("rules").classList.toggle("hidden", tab !== "rules");
    document.getElementById("photos").classList.toggle("hidden", tab !== "photos");

    if(tab === "photos") loadPhotos();
    if(tab === "games" || tab === "recommend") filter();
}

function openModal(g){
    document.getElementById("modalImg").src = normalizeImageUrl(g.img) || "https://picsum.photos/800/400";
    document.getElementById("modalName").textContent = g.name;
    document.getElementById("modalMeta").textContent = `適合人數：${g.minPlayers}–${g.maxPlayers}人　｜　遊戲時間：${g.timeText}`;
    document.getElementById("modalTags").innerHTML = g.tags.map(t=>`<span class="tag">${t}</span>`).join("");
    document.getElementById("modalFeature").textContent = `特色：${g.feature || "尚未填寫"}`;
    document.getElementById("youtubeLink").href = `https://www.youtube.com/results?search_query=${encodeURIComponent(g.name + " 桌遊 教學 介紹")}`;
    document.getElementById("modal").classList.remove("hidden");
}

function hideModal(){document.getElementById("modal").classList.add("hidden");}
function closeModal(e){if(e.target.id === "modal") hideModal();}
function openPhotoModal(src){document.getElementById("photoModalImg").src = src;document.getElementById("photoModal").classList.remove("hidden");}
function hidePhotoModal(){document.getElementById("photoModal").classList.add("hidden");}

fetch(GAME_CSV_URL)
.then(r=>r.text())
.then(text=>{
    const rows = parseCSV(text);
    const headers = rows[0];

    const idxName = idx(headers,"桌遊名稱");
    const idxMin = idx(headers,"最少人數");
    const idxMax = idx(headers,"最多人數");
    const idxTime = idx(headers,"時間");
    const idxTags = idx(headers,"標籤");
    const idxFeature = idx(headers,"特點");
    const idxNote = idx(headers,"備註");
    const idxImg = idx(headers,"圖片");

    games = rows.slice(1).map(r=>({
        name:r[idxName] || "",
        minPlayers:Number(r[idxMin]) || 1,
        maxPlayers:Number(r[idxMax]) || Number(r[idxMin]) || 99,
        timeText:r[idxTime] || "",
        time:parseTime(r[idxTime]),
        tags:splitTags(r[idxTags]),
        feature:r[idxFeature] || "",
        note:r[idxNote] || "",
        img:r[idxImg] || ""
    })).filter(g=>g.name);

    const allTags = [...new Set(games.flatMap(g=>g.tags))].sort();

    document.getElementById("tagFilter").innerHTML = allTags.map(tag=>`
        <label class="tag-check">
            <input class="tagOption" type="checkbox" value="${tag}">
            ${tag}
        </label>
    `).join("");

    document.querySelectorAll("select,input").forEach(el=>{
        el.addEventListener("input", filter);
        el.addEventListener("change", filter);
    });

    render(games);
});
</script>

</body>
</html>
