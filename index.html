<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鴉宅桌遊館藏</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f5f1e8;
}

header{
    background:#2f2a26;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

/* FILTER BAR */
.filter-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:15px 0;
}

select,input{
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-body{
    padding:10px;
}

.tag{
    display:inline-block;
    padding:3px 6px;
    background:#eee;
    border-radius:6px;
    font-size:12px;
    margin:2px;
}

.actions{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

button{
    border:none;
    padding:5px 8px;
    border-radius:6px;
    cursor:pointer;
}

/* ❤️ */
.heart{
    color:#999;
}
.heart.active{
    color:red;
}
</style>
</head>

<body>

<header>
    <h1>🎲鴉宅桌遊館藏</h1>
    <p>此聚會舉辦為私宅空間，請保持社交禮儀及注意音量</p>
</header>

<div class="container">

<!-- FILTER -->
<div class="filter-bar">
    <input id="search" placeholder="搜尋桌遊...">

    <select id="typeFilter">
        <option value="">全部類型</option>
    </select>

    <select id="playerFilter">
        <option value="">人數</option>
        <option value="2-4">2-4人</option>
        <option value="5-8">5-8人</option>
        <option value="9">9人以上</option>
    </select>

    

    <select id="sort">
        <option value="">排序</option>
        <option value="name">名稱</option>
        <option value="time">時間</option>
    </select>
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvXQzsi9vdZ-YmwD0DimRjHiutiDA9aoqy8Fb6R4muk5344G1xWL__MCxP8BcQuW1PQd9lFePCHlrc/pub?gid=1220295718&single=true&output=csv";

let games = [];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

/* ========= CSV PARSER（避免 split bug） ========= */
function parseCSV(text){
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows[0];

    return rows.slice(1).map(r => ({
        name: r[0],
        players: r[1],
        time: parseInt(r[2]) || 0,
        type: r[3],
        difficulty: r[4],
        feature: r[5],
        note: r[6],
        img: r[7] || "",
    }));
}

/* ========= RENDER ========= */
function render(list){

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    list.forEach(g => {

        const isFav = favorites.includes(g.name);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${g.img || 'https://picsum.photos/300/200'}">

            <div class="card-body">
                <h3>${g.name}</h3>

                <div>👥 ${g.players}</div>
                <div>⏱ ${g.time} 分</div>

                <div>
                    <span class="tag">${g.type}</span>
                    <span class="tag">${g.difficulty}</span>
                </div>

                <div style="font-size:12px;color:#666;margin-top:5px;">
                    ${g.feature || ""}
                </div>

                <div class="actions">
                    <button onclick="toggleFav('${g.name}')"
                        class="heart ${isFav ? 'active' : ''}">
                        ❤️
                    </button>
                </div>

            </div>
        `;

        grid.appendChild(card);
    });
}

/* ========= FILTER ========= */
function filter(){

    let result = [...games];

    const search = document.getElementById("search").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;
    const player = document.getElementById("playerFilter").value;
    const time = document.getElementById("timeFilter").value;
    const sort = document.getElementById("sort").value;

    if(search){
        result = result.filter(g => g.name.toLowerCase().includes(search));
    }

    if(type){
        result = result.filter(g => g.type === type);
    }

    if(time === "30"){
        result = result.filter(g => g.time <= 30);
    }
    if(time === "60"){
        result = result.filter(g => g.time > 30 && g.time <= 60);
    }
    if(time === "120"){
        result = result.filter(g => g.time > 60);
    }

    if(sort === "name"){
        result.sort((a,b)=>a.name.localeCompare(b.name));
    }
    if(sort === "time"){
        result.sort((a,b)=>a.time-b.time);
    }

    render(result);
}

/* ========= FAVORITE ========= */
function toggleFav(name){

    if(favorites.includes(name)){
        favorites = favorites.filter(n => n !== name);
    } else {
        favorites.push(name);
    }

    localStorage.setItem("fav", JSON.stringify(favorites));
    filter();
}

/* ========= INIT ========= */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {

    games = parseCSV(text);

    // 類型下拉
    const types = [...new Set(games.map(g => g.type))];
    const typeFilter = document.getElementById("typeFilter");

    types.forEach(t=>{
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        typeFilter.appendChild(opt);
    });

    document.querySelectorAll("input,select")
    .forEach(el => el.addEventListener("input", filter));

    render(games);
});

</script>

</body>
</html>
